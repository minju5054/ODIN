rescue_coordinator:
  ros__parameters:
    global_frame: map
    hostage_event_topic: /hostage_events
    merged_map_topic: /merged_map
    status_topic: /coordinator/status
    candidate_path_topic: /coordinator/candidate_path
    candidate_routes_topic: /coordinator/candidate_routes
    robot_3_spawn_trigger_topic: /robot_3/spawn_trigger
    rescue_goal_topic: /robot_3/goal_pose
    ai_waypoint_topic: /ai/waypoint_recommendation
    mission_policy_topic: /ai/mission_policy
    validated_waypoint_topic: /coordinator/validated_waypoint
    battlefield_config_file: ''
    robot_names:
      - robot_1
      - robot_2
      - robot_3
    safe_insertion_x: 7.5
    safe_insertion_y: -7.5
    safe_insertion_yaw: 1.5708
    map_min_x: -10.0
    map_max_x: 10.0
    map_min_y: -10.0
    map_max_y: 10.0
    duplicate_distance_m: 0.75
    duplicate_window_sec: 60.0
    rescue_standoff_m: 0.9
    rescue_standoff_samples: 16
    rescue_standoff_extra_radii_m:
      - 1.2
      - 1.5
    path_waypoint_spacing_m: 0.5
    route_detour_offsets_m:
      - 1.2
      - -1.2
      - 2.0
      - -2.0
    astar_unknown_penalties:
      - 3.0
      - 8.0
      - 15.0
    astar_obstacle_inflation_m: 0.18
    astar_max_expansions: 120000
    occupied_threshold: 65
    accessibility_radius_m: 0.15
    allow_unknown_cells: true
    allow_unmapped_rescue_goal_fallback: true
    validate_ai_waypoint_with_map: false
    require_robot_3_available_for_goal: false
    dispatch_candidate_without_ai: false
    use_nav2_path_planning: true
    compute_path_action: /robot_3/compute_path_to_pose
    fallback_to_straight_path: true
    rescue_route_delay_sec: 14.0
