explore_node:
  ros__parameters:
    use_sim_time: true
    robot_base_frame: robot_1/base_footprint
    return_to_init: false
    costmap_topic: map
    costmap_updates_topic: map_updates
    visualize: true
    planner_frequency: 0.25
    progress_timeout: 20.0
    potential_scale: 3.0
    orientation_scale: 0.0
    gain_scale: 1.0
    transform_tolerance: 0.5
    min_frontier_size: 0.25
